<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Code for Battle</title>
  <link rel="stylesheet" href="/src/legal/legal.css">
</head>

<body>
  <main class="legal-layout">
    <header class="legal-header">
      <a class="legal-home-link" href="/">← Back to game</a>
      <h1>Contact</h1>
      <nav class="legal-language-links" aria-label="Language switch">
        <a href="/kontakt">Deutsch</a> · <a href="/contact" aria-current="page">English</a>
      </nav>
    </header>
    <article class="legal-card">
      <p>Use the form below to get in touch. We will respond by email as soon as possible.</p>

      <form name="contact-en" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" action="/contact-success">
        <p class="legal-hidden">
          <label>Don't fill this out if you're human: <input name="bot-field"></label>
        </p>
        <div class="form-field">
          <label for="contact-name">Your name</label>
          <input id="contact-name" type="text" name="name" required>
        </div>
        <div class="form-field">
          <label for="contact-email">Your email</label>
          <input id="contact-email" type="email" name="email" required>
        </div>
        <div class="form-field">
          <label for="contact-subject">Subject</label>
          <input id="contact-subject" type="text" name="subject" required>
        </div>
        <div class="form-field">
          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="message" rows="6" required></textarea>
        </div>
        <p>
          <button type="submit" class="form-submit">Send message</button>
        </p>
      </form>
    </article>
  </main>
</body>

</html>
